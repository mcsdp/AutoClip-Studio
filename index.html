<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoClip Studio - Viral Video Maker</title>
  </head>
  <body>
    <div id="root">
      <div id="loading-indicator" style="display: flex; height: 100vh; align-items: center; justify-content: center; font-family: sans-serif; color: #666; flex-direction: column; gap: 1rem;">
        <div>Loading AutoClip Studio...</div>
        <div id="error-display" style="color: #ef4444; font-size: 12px; max-width: 80%; text-align: center;"></div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var display = document.getElementById('error-display');
        if (display) {
          display.innerText = 'Error: ' + msg + '\nLine: ' + lineNo;
        }
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
